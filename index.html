<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeyan AI | Universal Creative Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0b0d14; color: #e5e7eb; overflow-x: hidden; }
        .glass-panel { background: rgba(16, 19, 28, 0.95); border-right: 1px solid #1f2536; }
        .active-tool { background: rgba(37, 99, 235, 0.1); border-color: #3b82f6; border-left: 4px solid #3b82f6; color: #fff;}
        
        .dash-card { transition: all 0.3s ease; cursor: pointer; background: #121520; border: 1px solid #1f2536; position: relative; overflow: hidden; }
        .dash-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); background: #161a29; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        
        .free-tag { font-size: 9px; background: linear-gradient(90deg, #10b981, #3b82f6); color: white; padding: 1px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        .pro-tag { font-size: 9px; background: linear-gradient(90deg, #f59e0b, #ef4444); color: white; padding: 1px 6px; border-radius: 4px; font-weight: 800; }
        
        .voice-orb { border-radius: 50%; background: rgba(59, 130, 246, 0.2); border: 2px solid rgba(59, 130, 246, 0.4); transition: all 0.5s ease; }
        .listening { animation: pulse 1.5s infinite; border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); }
        
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1f2536; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="hidden md:flex w-64 flex-col glass-panel shadow-2xl z-20">
        <div class="p-6 border-b border-gray-800 flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30">
                <i class="fas fa-bolt text-white text-lg"></i>
            </div>
            <h1 class="text-xl font-extrabold tracking-tighter italic">ZEYAN<span class="text-blue-500">AI</span></h1>
        </div>

        <div class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
            <div id="authSection" class="mb-8">
                <button id="loginBtn" onclick="smartLogin()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                    <i class="fas fa-user-astronaut mr-2"></i> Sign In
                </button>
                <div id="userProfile" class="hidden p-4 bg-gray-900/40 rounded-2xl border border-gray-800">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black text-lg shadow-inner" id="userInitial">Z</div>
                        <div class="overflow-hidden">
                            <p id="displayUserName" class="text-xs font-bold truncate text-gray-100">User Name</p>
                            <p onclick="smartLogout()" class="text-[10px] text-red-500 font-semibold cursor-pointer hover:text-red-400 transition uppercase tracking-tighter">Sign Out</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-[10px] font-bold text-gray-600 uppercase tracking-[0.2em] px-3 mb-3">Main Tools</div>
            <button onclick="switchMode('chat')" id="btn-chat" class="w-full flex items-center p-3 rounded-xl active-tool text-sm transition font-medium"><i class="fas fa-comment-dots w-6 text-blue-400"></i> AI Chat</button>
            <button onclick="switchMode('image')" id="btn-image" class="w-full flex items-center p-3 rounded-xl text-sm text-gray-400 hover:text-gray-100 transition font-medium"><i class="fas fa-wand-magic-sparkles w-6 text-orange-400"></i> Image Gen</button>
            <button onclick="switchMode('voice')" id="btn-voice" class="w-full flex items-center p-3 rounded-xl text-sm text-gray-400 hover:text-gray-100 transition font-medium"><i class="fas fa-microphone-lines w-6 text-pink-400"></i> Voice Mode</button>
            
            <div class="text-[10px] font-bold text-gray-600 uppercase tracking-[0.2em] px-3 mt-8 mb-3">Creative Studio</div>
            <button onclick="alert('Video Studio launching very soon!')" class="w-full flex items-center p-3 rounded-xl text-sm text-gray-500 cursor-not-allowed group hover:bg-gray-800/20">
                <i class="fas fa-video w-6 text-red-500/40 group-hover:text-red-500/60 transition"></i> Video Studio
            </button>
            <button onclick="alert('Music Gen launching very soon!')" class="w-full flex items-center p-3 rounded-xl text-sm text-gray-500 cursor-not-allowed group hover:bg-gray-800/20">
                <i class="fas fa-music w-6 text-green-500/40 group-hover:text-green-500/60 transition"></i> Music Gen
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#0b0d14]">
        <header class="h-16 flex items-center justify-between px-8 border-b border-gray-800/50 bg-[#0b0d14]/80 backdrop-blur-xl z-10">
            <div class="flex items-center gap-4">
                <select id="modelSelect" class="bg-[#121520] border border-gray-700 text-xs font-bold rounded-xl px-4 py-2 outline-none text-gray-200 focus:border-blue-500 transition cursor-pointer">
                    <optgroup label="Free AI Models (Active)">
                        <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (Best) - Free</option>
                        <option value="huggingfaceh4/zephyr-7b-beta:free">Zephyr 7B - Free</option>
                        <option value="openchat/openchat-7b:free">OpenChat 7B - Free</option>
                    </optgroup>
                    <optgroup label="Pro AI Models">
                        <option value="google/gemini-2.0-flash-001">Gemini 2.
