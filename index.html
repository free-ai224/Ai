    <script>
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const modelSelect = document.getElementById('modelSelect');
        const welcomeScreen = document.getElementById('welcomeScreen');

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
        });

        async function talkToAI() {
            const prompt = userInput.value.trim();
            if(!prompt) return;
            
            // Remove welcome screen on first message
            if(welcomeScreen) welcomeScreen.style.display = 'none';

            // Reset Input
            userInput.value = '';
            userInput.style.height = 'auto';

            // User Message UI
            const uDiv = document.createElement('div');
            uDiv.className = "flex justify-end mb-6";
            uDiv.innerHTML = <div class="bg-blue-600 text-white px-5 py-3 rounded-2xl rounded-tr-sm text-sm max-w-[85%] sm:max-w-[75%] shadow-md leading-relaxed whitespace-pre-wrap">${prompt}</div>;
            chatBox.appendChild(uDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Loading Indicator UI
            const loadDiv = document.createElement('div');
            loadDiv.className = "flex justify-start mb-6 w-full";
            loadDiv.innerHTML = <div class="px-5 py-3 text-sm text-gray-400 flex items-center gap-2"><i class="fas fa-circle-notch fa-spin"></i> Generating response...</div>;
            chatBox.appendChild(loadDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Yahan ab direct Vercel API ko call ja rahi hai
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": modelSelect.value,
                        "prompt": prompt
                    })
                });
                
                const data = await response.json();
                chatBox.removeChild(loadDiv); // Remove loading

                if(data.error) {
                    throw new Error(data.error.message || "API Error");
                }

                // AI Response UI
                const aiDiv = document.createElement('div');
                aiDiv.className = "flex justify-start mb-6 w-full";
                
                const formattedContent = data.choices[0].message.content.replace(/\n/g, '<br>');
                
                aiDiv.innerHTML = `
                    <div class="flex gap-4 w-full">
                        <div class="w-8 h-8 rounded-full border border-gray-700 bg-gray-800 flex items-center justify-center shrink-0">
                            <i class="fas fa-robot text-gray-400 text-xs"></i>
                        </div>
                        <div class="bg-transparent text-gray-200 text-sm max-w-[90%] leading-relaxed pt-1 w-full">
                            ${formattedContent}
                            
                            <div class="mt-4 flex gap-3 text-gray-500">
                                <button class="hover:text-gray-300 transition"><i class="far fa-copy"></i></button>
                                <button class="hover:text-gray-300 transition"><i class="far fa-thumbs-up"></i></button>
                                <button class="hover:text-gray-300 transition"><i class="far fa-thumbs-down"></i></button>
                            </div>
                        </div>
                    </div>`;
                chatBox.appendChild(aiDiv);
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (err) { 
                chatBox.removeChild(loadDiv);
                alert("Error: Server se connection nahi ho pa raha. Make sure Vercel par Environment Variable set hai."); 
            }
        }

        sendBtn.onclick = talkToAI;
        
        userInput.addEventListener('keydown', (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                talkToAI(); 
            } 
        });
    </script>
