<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeyan AI | Universal Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0d14; color: #e5e7eb; overflow-x: hidden; }
        .glass-panel { background: rgba(16, 19, 28, 0.95); border-right: 1px solid #1f2536; }
        .free-badge { background: linear-gradient(90deg, #10b981, #3b82f6); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        .active-tool { background: rgba(37, 99, 235, 0.1); border-color: #3b82f6; border-left: 4px solid #3b82f6; color: #fff;}
        .dash-card { transition: all 0.3s ease; cursor: pointer; }
        .dash-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); }
        .voice-orb.listening { animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="hidden md:flex w-64 flex-col glass-panel shadow-2xl z-20">
        <div class="p-5 flex items-center justify-between border-b border-gray-800">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center"><i class="fas fa-bolt text-white"></i></div>
                <h1 class="text-xl font-bold">Zeyan<span class="text-blue-500">AI</span></h1>
            </div>
        </div>

        <div class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
            <div id="userSection" class="mb-6 p-3 bg-gray-900/50 rounded-xl border border-gray-800 hidden">
                <div class="flex items-center gap-3 mb-3">
                    <img id="userPhoto" src="" class="w-10 h-10 rounded-full border border-blue-500">
                    <div class="overflow-hidden">
                        <p id="userName" class="text-xs font-bold truncate">User Name</p>
                        <p class="text-[10px] text-green-500">● Online</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full py-1.5 text-[11px] bg-red-500/10 text-red-500 border border-red-500/20 rounded-lg hover:bg-red-500 hover:text-white transition">Logout</button>
            </div>

            <div id="loginSection" class="mb-6">
                <button onclick="login()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-600/20 hover:bg-blue-500 transition">
                    <i class="fas fa-user-circle mr-2"></i> Login with Google
                </button>
            </div>

            <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-2 mb-2">Studio Tools</div>
            <button id="chatModeBtn" onclick="switchMode('chat')" class="w-full flex items-center p-3 rounded-lg active-tool text-sm"><i class="fas fa-comment-dots w-5 text-blue-400"></i> AI Chat</button>
            <button id="imageModeBtn" onclick="switchMode('image')" class="w-full flex items-center p-3 rounded-lg text-sm text-gray-400 hover:text-gray-200"><i class="fas fa-image w-5 text-orange-400"></i> Image Gen</button>
            <button id="voiceModeBtn" onclick="switchMode('voice')" class="w-full flex items-center p-3 rounded-lg text-sm text-gray-400 hover:text-gray-200"><i class="fas fa-microphone-lines w-5 text-pink-400"></i> Voice Mode</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative w-full h-full">
        <header class="h-14 flex items-center justify-between px-4 border-b border-gray-800/50 bg-[#0b0d14]/90 backdrop-blur-md z-10">
            <select id="modelSelect" class="bg-[#121520] border border-gray-700 text-xs font-medium rounded-lg px-2 py-1.5 outline-none text-gray-300">
                <optgroup label="Free Models (Active)">
                    <option value="google/gemma-2-9b-it:free">Gemma 2 9B - Free</option>
                    <option value="mistralai/mistral-7b-instruct:free">Mistral 7B - Free</option>
                    <option value="qwen/qwen-2.5-7b-instruct:free">Qwen 2.5 - Free</option>
                    <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 - Free</option>
                    <option value="google/learnlm-1.5-pro-experimental:free">LearnLM 1.5 - Free</option>
                    <option value="huggingfaceh4/zephyr-7b-beta:free">Zephyr 7B - Free</option>
                    <option value="openchat/openchat-7b:free">OpenChat 7B - Free</option>
                </optgroup>
                <optgroup label="Pro Models">
                    <option value="x-ai/grok-2">Grok 2 - Pro</option>
                    <option value="google/gemini-2.0-flash-001">Gemini 2.0 - Pro</option>
                </optgroup>
            </select>
            <div class="flex items-center gap-2">
                <span class="free-badge">v2.0 Beta</span>
            </div>
        </header>

        <div id="textInterface" class="flex-1 flex flex-col overflow-hidden">
            <div id="chatBox" class="flex-1 overflow-y-auto p-4 max-w-4xl mx-auto w-full">
                <div id="welcomeScreen" class="py-10 text-center">
                    <h2 class="text-3xl font-extrabold mb-8 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Creative Dashboard</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div onclick="switchMode('image')" class="dash-card bg-[#121520] border border-gray-800 p-6 rounded-2xl">
                            <i class="fas fa-wand-magic-sparkles text-orange-500 text-2xl mb-2"></i>
                            <h3 class="font-bold">Image Gen</h3>
                            <p class="text-xs text-gray-500">Turn text into art</p>
                        </div>
                        <div onclick="switchMode('voice')" class="dash-card bg-[#121520] border border-gray-800 p-6 rounded-2xl">
                            <i class="fas fa-headset text-pink-500 text-2xl mb-2"></i>
                            <h3 class="font-bold">Voice Chat</h3>
                            <p class="text-xs text-gray-500">Talk to AI live</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-4 bg-gradient-to-t from-[#0b0d14] to-transparent">
                <div class="max-w-4xl mx-auto flex gap-2 bg-[#121520] border border-gray-700 rounded-2xl p-2">
                    <textarea id="userInput" rows="1" placeholder="Type here..." class="flex-1 bg-transparent py-3 px-4 outline-none text-sm resize-none"></textarea>
                    <button id="sendBtn" class="bg-blue-600 w-12 h-12 rounded-xl"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>

        <div id="voiceInterface" class="hidden flex-1 flex-col items-center justify-center">
            <div id="voiceOrb" class="w-32 h-32 rounded-full bg-blue-500/20 border-4 border-blue-500/50 flex items-center justify-center">
                <i class="fas fa-microphone text-3xl text-blue-500"></i>
            </div>
            <p id="voiceStatus" class="mt-8 text-gray-500 font-medium">Tap to talk</p>
            <button onclick="startVoice()" class="mt-10 w-16 h-16 bg-gray-800 rounded-full border-2 border-gray-700"><i class="fas fa-play text-blue-400"></i></button>
        </div>
    </main>

    <script>
        // --- Firebase Config (REPLACE WITH YOURS) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- Auth Logic ---
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('userSection').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('userSection').classList.add('hidden');
            }
        });

        // --- UI & AI Logic ---
        let activeMode = 'chat';
        function switchMode(m) {
            activeMode = m;
            document.getElementById('textInterface').classList.toggle('hidden', m === 'voice');
            document.getElementById('voiceInterface').classList.toggle('hidden', m !== 'voice');
            document.getElementById('chatModeBtn').classList.toggle('active-tool', m === 'chat');
            document.getElementById('imageModeBtn').classList.toggle('active-tool', m === 'image');
            document.getElementById('voiceModeBtn').classList.toggle('active-tool', m === 'voice');
        }

        async function handleSend() {
            const prompt = document.getElementById('userInput').value.trim();
            if(!prompt) return;
            if(!auth.currentUser) { alert("Please login first!"); return; }
            
            if(document.getElementById('welcomeScreen')) document.getElementById('welcomeScreen').remove();
            document.getElementById('userInput').value = '';

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="flex justify-end mb-4"><div class="bg-blue-600 px-4 py-2 rounded-xl text-sm">${prompt}</div></div>`;

            const loadDiv = document.createElement('div');
            loadDiv.innerHTML = `<div class="text-xs text-gray-500 mb-4 italic">Thinking...</div>`;
            chatBox.appendChild(loadDiv);

            try {
                if(activeMode === 'image') {
                    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=720&height=1280&nologo=true`;
                    loadDiv.innerHTML = `<img src="${url}" class="rounded-xl border border-gray-800 max-w-xs shadow-2xl mb-4">`;
                } else {
                    const res = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ model: document.getElementById('modelSelect').value, prompt: prompt })
                    });
                    const data = await res.json();
                    loadDiv.innerHTML = `<div class="bg-gray-800 px-4 py-2 rounded-xl text-sm border border-gray-700 mb-4">${data.choices[0].message.content.replace(/\n/g, '<br>')}</div>`;
                }
            } catch (e) { loadDiv.innerText = "Error: " + e.message; }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = handleSend;
        document.getElementById('userInput').onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

        function startVoice() {
            const rec = new webkitSpeechRecognition();
            rec.onstart = () => { document.getElementById('voiceOrb').classList.add('listening'); document.getElementById('voiceStatus').innerText = "Listening..."; };
            rec.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: document.getElementById('modelSelect').value, prompt: text }) });
                const data = await res.json();
                const utter = new SpeechSynthesisUtterance(data.choices[0].message.content);
                utter.onend = () => { document.getElementById('voiceOrb').classList.remove('listening'); document.getElementById('voiceStatus').innerText = "Tap to talk"; };
                window.speechSynthesis.speak(utter);
            };
            rec.start();
        }
    </script>
</body>
</html>
