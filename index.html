<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeyan AI | Universal Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0d14; color: #e5e7eb; overflow: hidden; }
        .glass-panel { background: rgba(16, 19, 28, 0.95); border-right: 1px solid #1f2536; }
        .active-tool { background: rgba(37, 99, 235, 0.1); border-color: #3b82f6; border-left: 4px solid #3b82f6; color: #fff;}
        .dash-card { transition: all 0.3s ease; cursor: pointer; background: #121520; border: 1px solid #1f2536; border-radius: 24px; padding: 24px; text-align: center; }
        .dash-card:hover { transform: translateY(-5px); border-color: #3b82f6; background: #161a29; }
        .ai-msg { background: #121520; border: 1px solid #1f2536; border-radius: 20px 20px 20px 0; }
        .user-msg { background: #2563eb; border-radius: 20px 20px 0 20px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1f2536; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="hidden md:flex w-64 flex-col glass-panel shadow-2xl z-20">
        <div class="p-6 border-b border-gray-800 flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-bolt text-white"></i></div>
            <h1 class="text-xl font-black italic">ZEYAN<span class="text-blue-500">AI</span></h1>
        </div>

        <div class="flex-1 px-3 py-4 space-y-2">
            <button onclick="switchMode('chat')" id="btn-chat" class="w-full flex items-center p-3 rounded-xl active-tool text-sm font-medium transition"><i class="fas fa-comment-dots w-6 text-blue-400"></i> AI Chat</button>
            <button onclick="switchMode('image')" id="btn-image" class="w-full flex items-center p-3 rounded-xl text-sm text-gray-400 hover:text-white transition"><i class="fas fa-image w-6 text-orange-400"></i> Image Gen</button>
            <button onclick="switchMode('voice')" id="btn-voice" class="w-full flex items-center p-3 rounded-xl text-sm text-gray-400 hover:text-white transition"><i class="fas fa-microphone-lines w-6 text-pink-400"></i> Voice Mode</button>
        </div>
        <div class="p-4 border-t border-gray-800 text-[10px] text-gray-500 font-bold uppercase">Status: <span class="text-green-500">v2.1 Stable</span></div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#0b0d14]">
        <header class="h-16 flex items-center justify-between px-6 border-b border-gray-800/50 bg-[#0b0d14]/80 backdrop-blur-md z-10">
            <select id="modelSelect" class="bg-[#121520] border border-gray-700 text-xs font-bold rounded-xl px-4 py-2 outline-none text-gray-200 focus:border-blue-500">
                <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (Fast) - Free</option>
                <option value="huggingfaceh4/zephyr-7b-beta:free">Zephyr 7B - Free</option>
                <option value="google/gemini-2.0-flash-001">Gemini 2.0 Pro</option>
            </select>
            <button onclick="window.speechSynthesis.cancel()" class="text-[10px] text-red-400 border border-red-400/20 px-3 py-1 rounded-full hover:bg-red-400/10 transition">Stop AI Voice</button>
        </header>

        <div id="chatContainer" class="flex-1 flex flex-col overflow-hidden relative">
            <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6 max-w-4xl mx-auto w-full pb-40">
                <div id="welcomeScreen" class="py-10 text-center">
                    <h2 class="text-5xl font-black text-white mb-4 italic tracking-tighter">ZEYAN <span class="text-blue-500 uppercase">Studio</span></h2>
                    <p class="text-gray-500 mb-12">Universal AI Hub for Images, Chat & Voice.</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-lg mx-auto">
                        <div onclick="switchMode('chat')" class="dash-card"><i class="fas fa-robot text-3xl text-blue-500 mb-4"></i><h3 class="font-bold">Chat Bot</h3></div>
                        <div onclick="switchMode('image')" class="dash-card"><i class="fas fa-magic text-3xl text-orange-500 mb-4"></i><h3 class="font-bold">Image Gen</h3></div>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#0b0d14] to-transparent">
                <div class="max-w-3xl mx-auto flex gap-3 bg-[#161a29] border border-gray-800 rounded-3xl p-2 shadow-2xl">
                    <textarea id="userInput" rows="1" placeholder="Type here..." class="flex-1 bg-transparent py-3 px-4 outline-none text-sm resize-none"></textarea>
                    <button id="sendBtn" class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-blue-500 transition"><i class="fas fa-paper-plane text-white"></i></button>
                </div>
            </div>
        </div>

        <div id="voiceInterface" class="hidden flex-1 flex-col items-center justify-center text-center">
            <div id="voiceOrb" class="w-40 h-40 rounded-full bg-blue-500/10 border-4 border-blue-500/20 flex items-center justify-center transition-all duration-500">
                <i class="fas fa-microphone text-4xl text-blue-500"></i>
            </div>
            <p id="voiceStatus" class="mt-10 text-gray-500 uppercase font-black text-xs tracking-widest">Tap to Speak with AI</p>
            <button onclick="startVoice()" class="mt-8 w-20 h-20 bg-gray-900 border-4 border-gray-800 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition">
                <i class="fas fa-play text-blue-500 text-2xl"></i>
            </button>
        </div>
    </main>

    <script>
        let mode = 'chat';
        function switchMode(m) {
            mode = m;
            document.getElementById('chatContainer').classList.toggle('hidden', m === 'voice');
            document.getElementById('voiceInterface').classList.toggle('hidden', m !== 'voice');
            const btns = document.querySelectorAll('aside button');
            btns.forEach(b => b.classList.remove('active-tool'));
            document.getElementById('btn-' + m).classList.add('active-tool');
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if(!prompt) return;
            
            if(document.getElementById('welcomeScreen')) document.getElementById('welcomeScreen').remove();
            input.value = '';

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="flex justify-end mb-4"><div class="user-msg text-white px-5 py-3 text-sm shadow-xl max-w-[85%]">${prompt}</div></div>`;

            const loadDiv = document.createElement('div');
            loadDiv.className = "flex justify-start mb-4 italic text-gray-500 text-xs";
            loadDiv.innerText = "AI is working...";
            chatBox.appendChild(loadDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                if(mode === 'image') {
                    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=720&height=1280&nologo=true&seed=${Math.floor(Math.random()*9999)}`;
                    loadDiv.innerHTML = `<div class="p-1 bg-[#121520] rounded-2xl border border-gray-800 inline-block"><img src="${url}" class="rounded-xl max-w-sm w-full"></div>`;
                } else {
                    const res = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ model: document.getElementById('modelSelect').value, prompt: prompt })
                    });
                    const data = await res.json();
                    const aiText = data.choices[0].message.content;
                    loadDiv.innerHTML = `<div class="ai-msg text-gray-200 px-5 py-3 text-sm max-w-[90%] shadow-lg leading-relaxed">${aiText.replace(/\n/g, '<br>')}</div>`;
                    
                    // Text to Voice automatically
                    const utter = new SpeechSynthesisUtterance(aiText);
                    window.speechSynthesis.speak(utter);
                }
            } catch (e) { loadDiv.innerHTML = `<div class="text-red-500 text-xs">Error: Connection failed.</div>`; }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = handleSend;
        document.getElementById('userInput').onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.onstart = () => { document.getElementById('voiceOrb').style.boxShadow = "0 0 40px #2563eb"; document.getElementById('voiceStatus').innerText = "Listening..."; };
            rec.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('voiceStatus').innerText = "Thinking...";
                const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: document.getElementById('modelSelect').value, prompt: text }) });
                const data = await res.json();
                const aiMsg = data.choices[0].message.content;
                const utter = new SpeechSynthesisUtterance(aiMsg);
                utter.onstart = () => { document.getElementById('voiceStatus').innerText = "AI is Speaking..."; };
                utter.onend = () => { document.getElementById('voiceStatus').innerText = "Tap to talk"; document.getElementById('voiceOrb').style.boxShadow = "none"; };
                window.speechSynthesis.speak(utter);
            };
            rec.start();
        }
    </script>
</body>
</html>
