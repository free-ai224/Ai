    <script>
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const modelSelect = document.getElementById('modelSelect');
        const welcomeScreen = document.getElementById('welcomeScreen');
        
        // Tool Switcher Logic
        let activeMode = 'chat'; 
        const chatModeBtn = document.getElementById('chatModeBtn');
        const imageModeBtn = document.getElementById('imageModeBtn');
        const currentToolBadge = document.getElementById('currentToolBadge');

        chatModeBtn.onclick = () => {
            activeMode = 'chat';
            chatModeBtn.classList.add('active-tool', 'text-gray-200');
            chatModeBtn.classList.remove('text-gray-400');
            imageModeBtn.classList.remove('active-tool', 'text-gray-200');
            imageModeBtn.classList.add('text-gray-400');
            userInput.placeholder = "Type your message here...";
            currentToolBadge.innerText = "Chat Mode";
            currentToolBadge.className = "text-[10px] font-bold text-blue-400 border border-blue-400/30 px-2 py-1 rounded uppercase";
            modelSelect.disabled = false;
        };

        imageModeBtn.onclick = () => {
            activeMode = 'image';
            imageModeBtn.classList.add('active-tool', 'text-gray-200');
            imageModeBtn.classList.remove('text-gray-400');
            chatModeBtn.classList.remove('active-tool', 'text-gray-200');
            chatModeBtn.classList.add('text-gray-400');
            userInput.placeholder = "Describe the image you want (e.g. realistic, cinematic lighting, 85mm lens)...";
            currentToolBadge.innerText = "Image Mode";
            currentToolBadge.className = "text-[10px] font-bold text-orange-400 border border-orange-400/30 px-2 py-1 rounded uppercase";
            modelSelect.disabled = true; // Not needed for image gen
        };

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
        });

        async function processInput() {
            const prompt = userInput.value.trim();
            if(!prompt) return;
            
            if(welcomeScreen) welcomeScreen.style.display = 'none';
            userInput.value = '';
            userInput.style.height = 'auto';

            // User Message UI
            const uDiv = document.createElement('div');
            uDiv.className = "flex justify-end mb-6";
            uDiv.innerHTML = `<div class="bg-[#1e293b] text-gray-100 px-5 py-3 rounded-2xl rounded-tr-sm text-sm max-w-[85%] shadow-md border border-gray-700">${prompt}</div>`;
            chatBox.appendChild(uDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Loading UI
            const loadDiv = document.createElement('div');
            loadDiv.className = "flex justify-start mb-6 w-full";
            loadDiv.innerHTML = `<div class="px-5 py-3 text-sm text-gray-400 flex items-center gap-2"><i class="fas fa-circle-notch fa-spin text-${activeMode === 'image' ? 'orange' : 'blue'}-500"></i> ${activeMode === 'image' ? 'Generating cinematic image...' : 'Thinking...'}</div>`;
            chatBox.appendChild(loadDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            if (activeMode === 'image') {
                // Free Image Generation Logic (Cinematic 9:16 aspect ratio)
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=720&height=1280&nologo=true`;
                
                const img = new Image();
                img.onload = () => {
                    chatBox.removeChild(loadDiv);
                    const aiDiv = document.createElement('div');
                    aiDiv.className = "flex justify-start mb-6 w-full";
                    aiDiv.innerHTML = `
                        <div class="flex gap-4 w-full">
                            <div class="w-8 h-8 rounded-full border border-orange-500/30 bg-orange-500/10 flex items-center justify-center shrink-0">
                                <i class="fas fa-image text-orange-500 text-xs"></i>
                            </div>
                            <div class="mt-1">
                                <img src="${imageUrl}" class="rounded-xl border border-gray-700 shadow-2xl max-w-sm w-full" alt="Generated AI Image">
                                <a href="${imageUrl}" target="_blank" class="text-xs text-orange-400 mt-2 inline-block hover:underline"><i class="fas fa-download"></i> Download Image</a>
                            </div>
                        </div>`;
                    chatBox.appendChild(aiDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                };
                img.onerror = () => {
                    chatBox.removeChild(loadDiv);
                    alert("Image generation failed. Please try again.");
                };
                img.src = imageUrl;

            } else {
                // Chat Logic (Vercel Backend)
                try {
                    const response = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ "model": modelSelect.value, "prompt": prompt })
                    });
                    
                    chatBox.removeChild(loadDiv);

                    // Custom Error Handling on Screen
                    if (!response.ok) {
                        let errorMsg = "Vercel par API Theek tarha connect nahi hui.";
                        if (response.status === 404) errorMsg = "404 Error: Vercel ko 'api' folder mein 'chat.js' file nahi mili. Folder check karein.";
                        else if (response.status === 500) errorMsg = "500 Error: OpenRouter API Key miss ho sakti hai ya Vercel Environment mein set nahi hui.";
                        
                        throw new Error(errorMsg);
                    }

                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message || "OpenRouter API limits reached.");

                    const aiDiv = document.createElement('div');
                    aiDiv.className = "flex justify-start mb-6 w-full";
                    const formattedContent = data.choices[0].message.content.replace(/\n/g, '<br>');
                    aiDiv.innerHTML = `
                        <div class="flex gap-4 w-full">
                            <div class="w-8 h-8 rounded-full border border-blue-500/30 bg-blue-500/10 flex items-center justify-center shrink-0">
                                <i class="fas fa-robot text-blue-500 text-xs"></i>
                            </div>
                            <div class="bg-transparent text-gray-200 text-sm max-w-[90%] leading-relaxed pt-1 w-full">
                                ${formattedContent}
                            </div>
                        </div>`;
                    chatBox.appendChild(aiDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;

                } catch (err) { 
                    if(document.body.contains(loadDiv)) chatBox.removeChild(loadDiv);
                    
                    // Show Error exactly in Chat so user knows what to fix
                    const errDiv = document.createElement('div');
                    errDiv.className = "flex justify-start mb-6 w-full";
                    errDiv.innerHTML = `
                        <div class="flex gap-4 w-full">
                            <div class="w-8 h-8 rounded-full border border-red-500/30 bg-red-500/10 flex items-center justify-center shrink-0">
                                <i class="fas fa-exclamation-triangle text-red-500 text-xs"></i>
                            </div>
                            <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm p-3 rounded-xl max-w-[90%]">
                                <b>Error:</b> ${err.message}
                            </div>
                        </div>`;
                    chatBox.appendChild(errDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }
        }

        sendBtn.onclick = processInput;
        userInput.addEventListener('keydown', (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processInput(); } 
        });
    </script>
